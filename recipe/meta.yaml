{% set name = "fastberry" %}
{% set version = "0.3.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fastberry-{{ version }}.tar.gz
  sha256: 9122a0419b867408914cd3135785568660ca51cf02bde322d4aea5fe409c71ac

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  entry_points:
    - startproject = fastberry.scripts.start_project:cli

requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}

test:
  imports:
    - fastberry
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/davidsarosi92/fastberry
  summary: Performance helpers for read-heavy Python web APIs, on both GraphQL and REST.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
