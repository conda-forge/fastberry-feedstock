{% set name = "fastberry" %}
{% set version = "0.3.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/fastberry-{{ version }}.tar.gz
  sha256: 3e5418609b8ad4334bbeb5afa5e6c51f36d218e40c2ac7ead10a0c3414362a0f

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0
  entry_points:
    - startproject = fastberry.scripts.start_project:cli

requirements:
  host:
    - pip
    - python {{ python_min }}
    - hatchling
    - hatch-vcs
  run:
    - python >={{ python_min }}
    - strawberry-graphql >=0.200
    - django >=4.2

test:
  imports:
    - fastberry
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/davidsarosi92/fastberry
  summary: Performance helpers for read-heavy Python web APIs, on both GraphQL and REST.
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - thewchan
